<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeDesk — Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="logo-mark">T</div>
      <span class="brand-name">TradeDesk</span>
    </a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start tracking live market data in seconds.</p>

    <div id="form-error" class="form-error"></div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" autocomplete="name" required />
        <div id="name-error" class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
        <div id="email-error" class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" required />
        <div id="password-error" class="field-error"></div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat password" autocomplete="new-password" required />
        <div id="confirm-error" class="field-error"></div>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Create Account</button>
    </form>

    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <script>
    (function () {
      const form     = document.getElementById('signup-form');
      const submitBtn= document.getElementById('submit-btn');
      const formErr  = document.getElementById('form-error');

      const fields = {
        name:     { el: document.getElementById('name'),     err: document.getElementById('name-error') },
        email:    { el: document.getElementById('email'),    err: document.getElementById('email-error') },
        password: { el: document.getElementById('password'), err: document.getElementById('password-error') },
        confirm:  { el: document.getElementById('confirm'),  err: document.getElementById('confirm-error') },
      };

      function fieldErr(key, msg) {
        const f = fields[key];
        f.err.textContent = msg;
        f.err.classList.add('visible');
        f.el.classList.add('error');
      }

      function clearField(key) {
        const f = fields[key];
        f.err.classList.remove('visible');
        f.el.classList.remove('error');
      }

      function clearAll() {
        Object.keys(fields).forEach(clearField);
        formErr.textContent = '';
        formErr.classList.remove('visible');
      }

      function showFormError(msg) {
        formErr.textContent = msg;
        formErr.classList.add('visible');
      }

      Object.keys(fields).forEach(key => {
        fields[key].el.addEventListener('input', () => clearField(key));
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearAll();

        const name     = fields.name.el.value.trim();
        const email    = fields.email.el.value.trim();
        const password = fields.password.el.value;
        const confirm  = fields.confirm.el.value;

        let valid = true;

        if (!name) { fieldErr('name', 'Full name is required.'); valid = false; }

        const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) { fieldErr('email', 'Email address is required.'); valid = false; }
        else if (!emailRe.test(email)) { fieldErr('email', 'Please enter a valid email address.'); valid = false; }

        if (!password) { fieldErr('password', 'Password is required.'); valid = false; }
        else if (password.length < 6) { fieldErr('password', 'Password must be at least 6 characters.'); valid = false; }

        if (!confirm) { fieldErr('confirm', 'Please confirm your password.'); valid = false; }
        else if (confirm !== password) { fieldErr('confirm', 'Passwords do not match.'); valid = false; }

        if (!valid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account…';

        try {
          const res  = await fetch('/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password }),
          });
          const data = await res.json();

          if (data.success) {
            window.location.href = 'login.html?registered=1';
          } else {
            showFormError(data.error || 'Could not create account. Please try again.');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create Account';
          }
        } catch {
          showFormError('Network error — please check your connection and try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      });
    })();
  </script>

</body>
</html>
